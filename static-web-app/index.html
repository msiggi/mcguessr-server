<!DOCTYPE html>
<html lang="de">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft GeoGuessr</title>
  <link rel="stylesheet" href="mcguessr.css">
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  
<div id="creator">
  <h2>The Creator</h2>
    <img src="images/Profilbild.png" alt="Kilior" id="profilbild">
  <a href="https://www.youtube.com/@kilior-yt" target="_blank" id="youtubeLink">YouTube</a>
  <a href="https://www.twitch.tv/kilioryt" target="_blank" id="twitchLink">Twitch</a>
  <a href="https://discord.gg/wCfe2PkcW6" target="_blank" id="dcLink">Discord</a>


</div>

  <!-- LINKS -->
  <div id="skinBlock">
    <img id="skinPreview" src="" alt="Skin">
    <input id="usernameInput" placeholder="Minecraft Username">
  </div>
<div class="three">
 
     <img src="images/logo.png" alt="Earth" id="Icon">
     <h1>Minecraft GeoGuessr</h1>
</div>
  <!-- RECHTS -->
  <div id="titleBlock">
    <button id="startBtn">Singleplayer</button>
    <button id="multiplayerBtn">Multiplayer</button>
    <button id="wieBtn">How to Play</button>
<div id="popup">
  <a href="https://www.youtube.com/@kilior-yt" target="_blank" id="youtubeLink">YouTube-Video</a>
  <br><br>
  <button onclick="document.getElementById('popup').style.display='none'">Close</button>
</div>
  </div>

</div>

<!-- GAME -->
<div id="game" style="display:none;">

  <div id="bigScore"></div>
  <!-- PLAYER UI -->
  <div id="playerUI">
    <img id="playerSkin">
    <span id="playerName"></span>
  </div>


  <!-- Bossbar -->
  <div id="bossbar">
    <div id="bossbar-fill"></div>
  </div>

  <!-- Screenshot -->
  <img id="screenshot" src="">

  <!-- Map -->
  <div id="mapContainer">
    <div id="mapViewport">
      <div id="mapWrapper">
        <img id="map" src="images/map.png">
        <img id="marker" src="images/Map_X.png">
        <img id="realMarker" src="images/Map_real.png">
        <div id="line"></div>
      </div>
    </div>

    <button id="guessBtn">Guess</button>
  </div>

  <!-- UI -->
  <p id="result"></p>
 <!-- <p id="coords"></p>  WICHTIG  -->

</div>

<div id="endScreen" style="display:none;">
  <div id="endBox">
    <h1>Game Over</h1>
    <div id="finalScore"></div>
    <button id="backBtn">Zurück zum Menü</button>
  </div>
</div>

<script src="mcguessr.js"></script>
</body>
</html>
